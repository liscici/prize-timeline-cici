<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中奖体验时间线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c2333;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { text-align: center; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
  .subtitle { text-align: center; color: #8899aa; font-size: 14px; margin-bottom: 16px; }
  .legend { display: flex; justify-content: center; gap: 24px; margin-bottom: 40px; font-size: 13px; color: #aab; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .legend-diamond { width: 12px; height: 12px; background: #f0c040; transform: rotate(45deg); border-radius: 2px; }

  /* Timeline axis */
  .timeline-axis {
    display: flex;
    justify-content: space-between;
    padding: 0 0 8px 0;
    margin: 0 0 4px 0;
    border-bottom: 1px solid #2a3550;
    font-size: 11px;
    color: #667;
    position: relative;
  }
  .timeline-axis span { text-align: center; flex: 1; }

  /* District */
  .district { margin-bottom: 36px; }
  .district-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a3550;
  }
  .district-bar { width: 4px; height: 28px; background: #f0c040; border-radius: 2px; }
  .district-name { font-size: 20px; font-weight: 600; }

  /* Row */
  .row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    align-items: center;
    margin-bottom: 14px;
    min-height: 48px;
  }
  .row-info { padding-right: 8px; }
  .row-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .row-desc { font-size: 12px; color: #8899aa; margin-bottom: 6px; }
  .row-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .tag-free-food { background: rgba(230,70,70,0.25); color: #ff8a8a; }
  .tag-free-trial { background: rgba(0,180,180,0.25); color: #5de8e8; }
  .tag-price { background: rgba(255,255,255,0.08); color: #aab; }
  .tag-note { background: rgba(255,255,255,0.06); color: #889; }

  /* Bar area */
  .bar-area {
    position: relative;
    height: 32px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar {
    position: absolute;
    height: 100%;
    border-radius: 6px;
    min-width: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    transition: opacity 0.2s;
  }
  .bar:hover { opacity: 0.85; }
  .bar-food { background: linear-gradient(135deg, #e64646, #c03030); }
  .bar-trial { background: linear-gradient(135deg, #00b4b4, #008888); }

  /* Today line */
  .today-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #f0c040;
    z-index: 10;
    pointer-events: none;
  }
  .today-label {
    position: absolute;
    top: -22px;
    transform: translateX(-50%);
    font-size: 10px;
    color: #f0c040;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .today-diamond {
    width: 8px; height: 8px;
    background: #f0c040;
    transform: rotate(45deg);
    border-radius: 1px;
    display: inline-block;
  }

  /* Grid lines */
  .grid-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }

  /* Footer */
  .footer {
    text-align: center;
    color: #445;
    font-size: 11px;
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #2a3550;
  }

  @media (max-width: 700px) {
    .row { grid-template-columns: 1fr; gap: 6px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>中奖体验时间线</h1>
  <p class="subtitle">免费菜 + 免费试 · 按行政区划分 · 2026年6月</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#e64646"></div>免费菜</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#00b4b4"></div>免费试</div>
    <div class="legend-item"><div class="legend-diamond"></div>今日 (6/13)</div>
  </div>

  <div id="app"></div>
  <div class="footer">数据来源：大众点评免费试 &nbsp; 生成于 2026-06-13</div>
</div>

<script>
const TODAY = new Date(2026, 5, 13); // June 13
const RANGE_START = new Date(2026, 5, 1);
const RANGE_END = new Date(2026, 6, 16); // July 16
const TOTAL_DAYS = (RANGE_END - RANGE_START) / 86400000;

function d(s) { const [m,day] = s.split('/').map(Number); return new Date(2026, m-1, day); }
function pct(date) { return ((date - RANGE_START) / 86400000 / TOTAL_DAYS * 100); }

const data = [
  { district: '宝安区', items: [
    { name: '一心缘糖水铺', desc: '炸鱼蛋1份(5个)', type: 'food', price: '¥10', note: '周六不可用', start: '06/10', end: '06/24' },
    { name: '福客麻辣烫(大千里店)', desc: '肥牛麻辣烫1份', type: 'food', price: '¥34.9', note: '周末节假日不可用', start: '06/10', end: '06/24' },
    { name: '蚝蚝先生·广式烧烤', desc: '藤椒鸡肉串4串+山楂饮', type: 'food', price: '¥24', note: '', start: '06/11', end: '06/25' },
    { name: '壹心空间·自习室', desc: '自习室体验', type: 'trial', price: '¥30', note: '提前1天预约', start: '06/03', end: '07/02' },
    { name: '卧岛猫咪洗护(大悦城)', desc: '基础洗护-短毛猫', type: 'trial', price: '¥188', note: '新客专享', start: '06/05', end: '07/04' },
  ]},
  { district: '南山区', items: [
    { name: '遇南三·重庆火锅村', desc: '红油牛肉包子1份', type: 'food', price: '¥20', note: '可打包', start: '06/13', end: '06/27' },
    { name: 'LIVES TENNIS(海上世界)', desc: 'AI网球发球机60min', type: 'trial', price: '¥140', note: '首次体验', start: '06/05', end: '07/19' },
  ]},
];

// Build axis ticks
const ticks = [];
let dt = new Date(RANGE_START);
while (dt <= RANGE_END) {
  ticks.push(new Date(dt));
  dt.setDate(dt.getDate() + 5);
}

const app = document.getElementById('app');

// Axis HTML
function axisHTML() {
  let html = '<div class="timeline-axis">';
  ticks.forEach(t => {
    const m = t.getMonth() + 1;
    const day = t.getDate();
    html += `<span>${String(m).padStart(2,'0')}/${String(day).padStart(2,'0')}</span>`;
  });
  html += '</div>';
  return html;
}

data.forEach((group, gi) => {
  let html = `<div class="district">`;
  html += `<div class="district-header"><div class="district-bar"></div><div class="district-name">${group.district}</div></div>`;
  html += axisHTML();

  group.items.forEach(item => {
    const s = d(item.start), e = d(item.end);
    const left = pct(s);
    const width = pct(e) - left;
    const isFood = item.type === 'food';
    const barClass = isFood ? 'bar-food' : 'bar-trial';
    const tagClass = isFood ? 'tag-free-food' : 'tag-free-trial';
    const tagLabel = isFood ? '免费菜' : '免费试';
    const todayPct = pct(TODAY);

    html += `<div class="row">`;
    html += `<div class="row-info">`;
    html += `<div class="row-title">${item.name}</div>`;
    html += `<div class="row-desc">${item.desc}</div>`;
    html += `<div class="row-tags">`;
    html += `<span class="tag ${tagClass}">${tagLabel}</span>`;
    html += `<span class="tag tag-price">${item.price}</span>`;
    if (item.note) html += `<span class="tag tag-note">${item.note}</span>`;
    html += `</div></div>`;

    html += `<div class="bar-area">`;
    // Grid lines
    ticks.forEach(t => {
      const gp = pct(t);
      html += `<div class="grid-line" style="left:${gp}%"></div>`;
    });
    // Bar
    html += `<div class="bar ${barClass}" style="left:${left}%;width:${width}%">`;
    html += `${item.start} - ${item.end}`;
    html += `</div>`;
    // Today line
    html += `<div class="today-line" style="left:${todayPct}%">`;
    html += `<div class="today-label"><span class="today-diamond"></span>今日 6/13</div>`;
    html += `</div>`;
    html += `</div></div>`;
  });

  html += '</div>';
  app.innerHTML += html;
});
</script>
</body>
</html>
