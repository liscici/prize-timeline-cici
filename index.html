<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中奖体验时间线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c2333;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { text-align: center; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
  .subtitle { text-align: center; color: #8899aa; font-size: 14px; margin-bottom: 16px; }
  .legend { display: flex; justify-content: center; gap: 24px; margin-bottom: 40px; font-size: 13px; color: #aab; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .legend-diamond { width: 12px; height: 12px; background: #f0c040; transform: rotate(45deg); border-radius: 2px; }

  .timeline-axis {
    display: flex; justify-content: space-between;
    padding: 0 0 8px 0; margin: 0 0 4px 0;
    border-bottom: 1px solid #2a3550;
    font-size: 11px; color: #667; position: relative;
  }
  .timeline-axis span { text-align: center; flex: 1; }

  .district { margin-bottom: 36px; }
  .district-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid #2a3550;
  }
  .district-bar { width: 4px; height: 28px; background: #f0c040; border-radius: 2px; }
  .district-name { font-size: 20px; font-weight: 600; }
  .district-count { font-size: 12px; color: #667; margin-left: 8px; }

  .row {
    display: grid; grid-template-columns: 200px 1fr;
    gap: 16px; align-items: center;
    margin-bottom: 14px; min-height: 48px;
    transition: opacity 0.3s, filter 0.3s;
  }
  .row-info { padding-right: 8px; }
  .row-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .row-title a { color: #fff; text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.3); transition: border-color 0.2s; }
  .row-title a:hover { border-color: #f0c040; }
  .row-addr { font-size: 11px; color: #556; margin-bottom: 4px; display: flex; align-items: center; gap: 3px; }
  .row-addr .pin { font-size: 10px; }
  .row-desc { font-size: 12px; color: #8899aa; margin-bottom: 6px; }
  .row-tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .tag-free-food { background: rgba(230,70,70,0.25); color: #ff8a8a; }
  .tag-free-trial { background: rgba(0,180,180,0.25); color: #5de8e8; }
  .tag-explore { background: rgba(240,180,60,0.25); color: #f0c040; }
  .tag-price { background: rgba(255,255,255,0.08); color: #aab; }
  .tag-note { background: rgba(255,255,255,0.06); color: #889; }

  /* Action buttons */
  .btn-done {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 8px; border-radius: 3px;
    background: rgba(80,200,120,0.15); color: #6dda8a;
    border: 1px solid rgba(80,200,120,0.3);
    cursor: pointer; transition: all 0.2s;
  }
  .btn-done:hover { background: rgba(80,200,120,0.3); }
  .btn-done.checked { background: rgba(80,200,120,0.35); border-color: #6dda8a; }

  .btn-review {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 8px; border-radius: 3px;
    background: rgba(180,130,255,0.15); color: #b48eff;
    border: 1px solid rgba(180,130,255,0.3);
    cursor: pointer; transition: all 0.2s;
  }
  .btn-review:hover { background: rgba(255,80,80,0.25); color: #ff8a8a; border-color: rgba(255,80,80,0.4); }

  /* Done (grayed) state */
  .row-done {
    opacity: 0.35;
    filter: grayscale(0.8);
  }
  .row-done .row-title { text-decoration: line-through; }
  .row-done .bar { opacity: 0.3; }

  /* Reviewed state — fade out then remove */
  .row-reviewed {
    animation: fadeOut 0.4s ease forwards;
  }
  @keyframes fadeOut {
    to { opacity: 0; max-height: 0; margin: 0; padding: 0; overflow: hidden; }
  }

  .bar-area {
    position: relative; height: 32px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px; overflow: hidden;
  }
  .bar {
    position: absolute; height: 100%; border-radius: 6px; min-width: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    transition: opacity 0.2s;
  }
  .bar:hover { opacity: 0.85; }
  .bar-food { background: linear-gradient(135deg, #e64646, #c03030); }
  .bar-trial { background: linear-gradient(135deg, #00b4b4, #008888); }
  .bar-explore { background: linear-gradient(135deg, #d4a017, #b8860b); }

  .today-line {
    position: absolute; top: 0; bottom: 0;
    width: 2px; background: #f0c040;
    z-index: 10; pointer-events: none;
  }
  .today-label {
    position: absolute; top: -22px; transform: translateX(-50%);
    font-size: 10px; color: #f0c040; white-space: nowrap;
    display: flex; align-items: center; gap: 3px;
  }
  .today-diamond {
    width: 8px; height: 8px; background: #f0c040;
    transform: rotate(45deg); border-radius: 1px; display: inline-block;
  }
  .grid-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,0.04); pointer-events: none;
  }

  .section-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 20px 0 10px; font-size: 12px; color: #556;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: #2a3550; }

  .footer {
    text-align: center; color: #445; font-size: 11px;
    margin-top: 40px; padding-top: 16px;
    border-top: 1px solid #2a3550;
  }

  @media (max-width: 700px) {
    .row { grid-template-columns: 1fr; gap: 6px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>中奖体验时间线</h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#e64646"></div>免费菜</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#00b4b4"></div>免费试</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#d4a017"></div>0元探店</div>
    <div class="legend-item"><div class="legend-diamond"></div>今日</div>
  </div>
  <div id="app"></div>
  <div class="footer">数据来源：大众点评免费试 &nbsp; 更新于 <span id="update-date"></span></div>
</div>

<script>
// === Real-time date ===
const TODAY = new Date();
const todayStr = `${TODAY.getMonth()+1}月${TODAY.getDate()}日`;
document.getElementById('subtitle').textContent = `免费菜 + 免费试 + 0元探店 · 按行政区划分 · ${TODAY.getFullYear()}年${TODAY.getMonth()+1}月`;
document.getElementById('update-date').textContent = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;

const RANGE_START = new Date(2026, 4, 15);
const RANGE_END = new Date(2026, 6, 20);
const TOTAL_DAYS = (RANGE_END - RANGE_START) / 86400000;

function d(s) { const [m,day] = s.split('/').map(Number); return new Date(2026, m-1, day); }
function pct(date) { return ((date - RANGE_START) / 86400000 / TOTAL_DAYS * 100); }
function itemKey(item) { return item.name + '|' + item.start; }

const data = [
  { district: '宝安区', items: [
    { name: '喜鸽光明乳鸽·粤点海鲜', desc: '双人套餐', type: 'explore', price: '¥194', note: '需提前1天预约', start: '05/18', end: '07/16', addr: '新安街道西城上筑佳禾荟商场二楼202号', lat: 22.556704, lng: 113.890848 },
    { name: '一心缘糖水铺', desc: '炸鱼蛋1份(5个)', type: 'food', price: '¥10', note: '周六不可用', start: '06/10', end: '06/24', addr: '西乡街道径贝社区78-2号', lat: 22.568409, lng: 113.877669 },
    { name: '福客麻辣烫(大千里店)', desc: '肥牛麻辣烫1份', type: 'food', price: '¥34.9', note: '周末节假日不可用', start: '06/10', end: '06/24', addr: '海城路宝安大仟里负1层160号', lat: 22.571166, lng: 113.873095 },
    { name: '蚝蚝先生·广式烧烤', desc: '藤椒鸡肉串4串+山楂饮', type: 'food', price: '¥24', note: '', start: '06/11', end: '06/25', addr: '新安街道兴华一路19号前海HOP天地', lat: 22.550375, lng: 113.886716 },
    { name: '酸咕咕·云贵川山野火锅', desc: '云南野菜糍粑（仅限堂食）', type: 'food', price: '¥20', note: '节假日不可用', start: '06/09', end: '06/23', addr: '西乡街道桃源幸福里', lat: 22.616404, lng: 113.859682 },
    { name: 'MUJINY木槿钰·创意韩餐', desc: '香茅黄金脆软骨（仅限堂食）', type: 'food', price: '¥36', note: '周六节假日不可用', start: '06/10', end: '06/24', addr: '宝安大仟里3楼L379-380', lat: 22.570195, lng: 113.872693 },
    { name: '壹心空间·自习室', desc: '自习室体验', type: 'trial', price: '¥30', note: '提前1天预约', start: '06/03', end: '07/02', addr: '多门店', lat: null, lng: null },
    { name: '熊猫烫火锅·现炒锅底', desc: '手作成都小酥肉（仅限堂食）', type: 'food', price: '¥20', note: '法定假期不可用·壹方城B2', start: '06/13', end: '06/27', addr: '新湖路99号壹方城购物中心B2层013A铺', lat: 22.552284, lng: 113.887686 },
    { name: '卧岛猫咪洗护(大悦城)', desc: '基础洗护-短毛猫', type: 'trial', price: '¥188', note: '新客专享', start: '06/05', end: '07/04', addr: '创业二路与前进一路交汇处深圳大悦城', lat: 22.569152, lng: 113.902391 },
    { name: '华阳高尔夫国际学院', desc: '高尔夫职业教练一对一教学体验课', type: 'trial', price: '¥268', note: '西乡·144人已报名', start: '06/05', end: '07/04', addr: '尖岗山大道', lat: 22.595771, lng: 113.901012 },
    { name: '潮汕人家深夜烧烤', desc: '碳烤大元贝（仅限堂食）', type: 'food', price: '¥25', note: '法定节假日不可用', start: '06/13', end: '06/27', addr: '聚豪别墅区·金湾大道', lat: 22.566507, lng: 113.852213 },
  ]},
  { district: '南山区', items: [
    { name: '遇南三·重庆火锅村', desc: '红油牛肉包子1份', type: 'food', price: '¥20', note: '可打包', start: '06/13', end: '06/27', addr: '南山大道华联商业街40-102号', lat: 22.519722, lng: 113.921966 },
    { name: 'PARTY HOUSE 潮玩电玩城', desc: '100枚游戏币兑换', type: 'trial', price: '¥100', note: '海上世界·330人已报名', start: '06/05', end: '07/04', addr: '海上世界C区船后广场C-L2005B', lat: 22.483402, lng: 113.917858 },
    { name: 'LIVES TENNIS(海上世界)', desc: 'AI网球发球机60min', type: 'trial', price: '¥140', note: '首次体验', start: '06/05', end: '07/19', addr: '招商街道沿山路3号', lat: 22.486871, lng: 113.913623 },
  ]},
];

// === State (localStorage) ===
const STATE_KEY = 'prize_timeline_state';
function getState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { return {}; }
}
function setState(s) { localStorage.setItem(STATE_KEY, JSON.stringify(s)); }
function toggleDone(key) {
  const s = getState();
  if (s[key] === 'done') { delete s[key]; } else { s[key] = 'done'; }
  setState(s); render();
}
function markReviewed(key) {
  const s = getState();
  s[key] = 'reviewed';
  setState(s);
  // Animate fade out
  const el = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (el) { el.classList.add('row-reviewed'); setTimeout(() => render(), 450); }
  else { render(); }
}

// === Ticks ===
const ticks = [];
let dt = new Date(RANGE_START);
while (dt <= RANGE_END) { ticks.push(new Date(dt)); dt.setDate(dt.getDate() + 5); }

const todayPct = pct(TODAY);
const app = document.getElementById('app');

function axisHTML() {
  let html = '<div class="timeline-axis">';
  ticks.forEach(t => {
    html += `<span>${String(t.getMonth()+1).padStart(2,'0')}/${String(t.getDate()).padStart(2,'0')}</span>`;
  });
  html += '</div>';
  return html;
}

function rowHTML(item, key, isDone) {
  const s = d(item.start), e = d(item.end);
  const left = pct(s), width = pct(e) - left;
  const isFood = item.type === 'food';
  const isExplore = item.type === 'explore';
  const barClass = isFood ? 'bar-food' : isExplore ? 'bar-explore' : 'bar-trial';
  const tagClass = isFood ? 'tag-free-food' : isExplore ? 'tag-explore' : 'tag-free-trial';
  const tagLabel = isFood ? '免费菜' : isExplore ? '0元探店' : '免费试';

  let html = `<div class="row ${isDone ? 'row-done' : ''}" data-key="${key}">`;
  html += `<div class="row-info">`;
  // Title with map link
  if (item.lat && item.lng) {
    const mapUrl = `https://uri.amap.com/marker?position=${item.lng},${item.lat}&name=${encodeURIComponent(item.name)}`;
    html += `<div class="row-title"><a href="${mapUrl}" target="_blank" rel="noopener">${item.name}</a></div>`;
    html += `<div class="row-addr"><span class="pin">📍</span>${item.addr}</div>`;
  } else {
    html += `<div class="row-title">${item.name}</div>`;
    if (item.addr) html += `<div class="row-addr"><span class="pin">📍</span>${item.addr}</div>`;
  }
  html += `<div class="row-desc">${item.desc}</div>`;
  html += `<div class="row-tags">`;
  html += `<span class="tag ${tagClass}">${tagLabel}</span>`;
  html += `<span class="tag tag-price">${item.price}</span>`;
  if (item.note) html += `<span class="tag tag-note">${item.note}</span>`;
  // Action buttons
  html += `<span class="btn-done ${isDone ? 'checked' : ''}" onclick="toggleDone('${key}')">`;
  html += isDone ? '✓ 已体验' : '☐ 体验了';
  html += `</span>`;
  if (isDone) {
    html += `<span class="btn-review" onclick="markReviewed('${key}')">已评论 ✕</span>`;
  }
  html += `</div></div>`;

  html += `<div class="bar-area">`;
  ticks.forEach(t => { html += `<div class="grid-line" style="left:${pct(t)}%"></div>`; });
  html += `<div class="bar ${barClass}" style="left:${left}%;width:${width}%">${item.start} - ${item.end}</div>`;
  html += `<div class="today-line" style="left:${todayPct}%"><div class="today-label"><span class="today-diamond"></span>今日 ${todayStr}</div></div>`;
  html += `</div></div>`;
  return html;
}

function render() {
  const state = getState();
  let out = '';

  data.forEach(group => {
    const active = [], done = [];
    group.items.forEach(item => {
      const key = itemKey(item);
      if (state[key] === 'reviewed') return; // deleted
      if (state[key] === 'done') done.push(item);
      else active.push(item);
    });

    const total = active.length + done.length;
    if (total === 0) return;

    out += `<div class="district">`;
    out += `<div class="district-header"><div class="district-bar"></div>`;
    out += `<div class="district-name">${group.district}</div>`;
    out += `<div class="district-count">${active.length} 进行中 / ${done.length} 已体验</div>`;
    out += `</div>`;
    out += axisHTML();

    // Active items first
    active.forEach(item => { out += rowHTML(item, itemKey(item), false); });

    // Done items at bottom with divider
    if (done.length > 0) {
      out += `<div class="section-divider">已体验</div>`;
      done.forEach(item => { out += rowHTML(item, itemKey(item), true); });
    }

    out += `</div>`;
  });

  app.innerHTML = out;
}

render();
</script>
</body>
</html>
